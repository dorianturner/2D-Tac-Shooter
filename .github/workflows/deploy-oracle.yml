name: Deploy Oracle

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: oracle-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ORACLE_HOST: ${{ secrets.ORACLE_HOST || '141.147.85.169' }}
      ORACLE_USER: ${{ secrets.ORACLE_USER || 'opc' }}
      ORACLE_PORT: ${{ secrets.ORACLE_PORT || '22' }}
      RELEASE: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create runtime release archive
        run: |
          ./scripts/package-runtime.sh "${RELEASE}" "/tmp/tac-shooter-${RELEASE}.tar.gz"

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [[ -z "${{ secrets.ORACLE_SSH_PRIVATE_KEY }}" ]]; then
            echo "::error::Missing ORACLE_SSH_PRIVATE_KEY secret"
            exit 1
          fi

          printf '%s\n' "${{ secrets.ORACLE_SSH_PRIVATE_KEY }}" > ~/.ssh/oracle
          chmod 600 ~/.ssh/oracle
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          cat > ~/.ssh/config <<'EOF'
Host oracle
  HostName ${ORACLE_HOST}
  User ${ORACLE_USER}
  Port ${ORACLE_PORT}
  IdentityFile ~/.ssh/oracle
  StrictHostKeyChecking accept-new
  UserKnownHostsFile ~/.ssh/known_hosts
  ServerAliveInterval 30
  ServerAliveCountMax 3
EOF
          chmod 600 ~/.ssh/config

          ssh-keyscan -p "${ORACLE_PORT}" "${ORACLE_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || echo "::warning::ssh-keyscan failed; continuing with accept-new"

      - name: Prepare remote directories
        run: |
          ssh -F ~/.ssh/config oracle \
            "sudo mkdir -p /opt/tac-shooter && sudo chown -R ${ORACLE_USER}:${ORACLE_USER} /opt/tac-shooter"

      - name: Upload release archive
        run: |
          scp -F ~/.ssh/config "/tmp/tac-shooter-${RELEASE}.tar.gz" oracle:/tmp/tac-shooter-${RELEASE}.tar.gz

      - name: Deploy release
        run: |
          ssh -F ~/.ssh/config oracle \
            "GITHUB_SHA=${RELEASE} bash -s" < scripts/deploy-oracle.sh

      - name: Smoke test
        run: |
          if ! curl --fail --retry 12 --retry-delay 5 --max-time 10 "http://${ORACLE_HOST}/api/health"; then
            echo "::error::Public HTTP smoke test failed. Checking service health over SSH."
            ssh -F ~/.ssh/config oracle \
              "sudo systemctl --no-pager --lines=80 status tac-shooter; echo ===LOCAL_HEALTH===; curl -i --max-time 5 http://127.0.0.1/api/health || true; echo ===PORTS===; sudo ss -ltnp | grep ':80' || true"
            exit 1
          fi
