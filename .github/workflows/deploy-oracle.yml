name: Deploy Oracle

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: oracle-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ORACLE_HOST: ${{ secrets.ORACLE_HOST || '141.147.85.169' }}
      ORACLE_USER: ${{ secrets.ORACLE_USER || 'opc' }}
      ORACLE_PORT: ${{ secrets.ORACLE_PORT || '22' }}
      RELEASE: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create runtime release archive
        run: |
          ./scripts/package-runtime.sh "${RELEASE}" "/tmp/tac-shooter-${RELEASE}.tar.gz"

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [[ -z "${ORACLE_SSH_PRIVATE_KEY:-}" ]]; then
            echo "::error::Missing ORACLE_SSH_PRIVATE_KEY secret"
            exit 1
          fi

          printf '%s\n' "${ORACLE_SSH_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/oracle
          chmod 600 ~/.ssh/oracle
          ssh-keygen -y -f ~/.ssh/oracle >/dev/null || {
            echo "::error::ORACLE_SSH_PRIVATE_KEY is not a valid private key"
            exit 1
          }

          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          {
            printf '%s\n' 'Host oracle'
            printf '  HostName %s\n' "${ORACLE_HOST}"
            printf '  User %s\n' "${ORACLE_USER}"
            printf '  Port %s\n' "${ORACLE_PORT}"
            printf '%s\n' '  IdentityFile ~/.ssh/oracle'
            printf '%s\n' '  StrictHostKeyChecking accept-new'
            printf '%s\n' '  UserKnownHostsFile ~/.ssh/known_hosts'
            printf '%s\n' '  ServerAliveInterval 30'
            printf '%s\n' '  ServerAliveCountMax 3'
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

          for attempt in 1 2 3 4 5; do
            if timeout 10 ssh-keyscan -T 8 -p "${ORACLE_PORT}" "${ORACLE_HOST}" >> ~/.ssh/known_hosts 2>/tmp/ssh-keyscan.err; then
              break
            fi
            echo "::warning::ssh-keyscan attempt ${attempt} failed: $(cat /tmp/ssh-keyscan.err)"
            sleep 3
          done

          ssh -F ~/.ssh/config -o BatchMode=yes -o ConnectTimeout=15 oracle "echo ssh-ready"
        env:
          ORACLE_SSH_PRIVATE_KEY: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}

      - name: Prepare remote directories
        run: |
          ssh -F ~/.ssh/config oracle \
            "sudo mkdir -p /opt/tac-shooter && sudo chown -R ${ORACLE_USER}:${ORACLE_USER} /opt/tac-shooter"

      - name: Upload release archive
        run: |
          scp -F ~/.ssh/config "/tmp/tac-shooter-${RELEASE}.tar.gz" oracle:/tmp/tac-shooter-${RELEASE}.tar.gz

      - name: Deploy release
        run: |
          ssh -F ~/.ssh/config oracle \
            "GITHUB_SHA=${RELEASE} bash -s" < scripts/deploy-oracle.sh

      - name: Smoke test
        run: |
          set -euo pipefail
          ssh -F ~/.ssh/config oracle \
            "for i in \$(seq 1 24); do curl -fsS --max-time 5 http://127.0.0.1/api/health && exit 0; sleep 2; done; sudo systemctl --no-pager --lines=120 status tac-shooter; sudo journalctl -u tac-shooter --no-pager -n 120; exit 1"

          if curl --fail --retry 12 --retry-delay 5 --max-time 10 "http://${ORACLE_HOST}/api/health"; then
            exit 0
          fi

          echo "::warning::Remote service is healthy over SSH, but public HTTP smoke check failed. Check OCI ingress/security-list rules for TCP/80."
          ssh -F ~/.ssh/config oracle \
            "echo ===SERVICE===; sudo systemctl --no-pager --lines=80 status tac-shooter || true; echo ===PORTS===; sudo ss -ltnp | grep ':80' || true; echo ===FIREWALL===; (sudo firewall-cmd --list-all || true); (sudo iptables -S INPUT || true)"
