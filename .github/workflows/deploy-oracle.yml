name: Deploy Oracle

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: oracle-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ORACLE_HOST: ${{ secrets.ORACLE_HOST || '141.147.85.169' }}
      ORACLE_USER: ${{ secrets.ORACLE_USER || 'opc' }}
      ORACLE_PORT: ${{ secrets.ORACLE_PORT || '22' }}
      RELEASE: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create runtime release archive
        run: |
          ./scripts/package-runtime.sh "${RELEASE}" "/tmp/tac-shooter-${RELEASE}.tar.gz"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ORACLE_SSH_PRIVATE_KEY }}" > ~/.ssh/oracle
          chmod 600 ~/.ssh/oracle
          ssh-keyscan -p "${ORACLE_PORT}" "${ORACLE_HOST}" >> ~/.ssh/known_hosts

      - name: Prepare remote directories
        run: |
          ssh -i ~/.ssh/oracle -p "${ORACLE_PORT}" "${ORACLE_USER}@${ORACLE_HOST}" \
            "sudo mkdir -p /opt/tac-shooter && sudo chown -R ${ORACLE_USER}:${ORACLE_USER} /opt/tac-shooter"

      - name: Upload release archive
        run: |
          scp -i ~/.ssh/oracle -P "${ORACLE_PORT}" "/tmp/tac-shooter-${RELEASE}.tar.gz" \
            "${ORACLE_USER}@${ORACLE_HOST}:/tmp/tac-shooter-${RELEASE}.tar.gz"

      - name: Deploy release
        run: |
          ssh -i ~/.ssh/oracle -p "${ORACLE_PORT}" "${ORACLE_USER}@${ORACLE_HOST}" \
            "GITHUB_SHA=${RELEASE} bash -s" < scripts/deploy-oracle.sh

      - name: Smoke test
        run: |
          if ! curl --fail --retry 6 --retry-delay 3 "http://${ORACLE_HOST}/api/health"; then
            echo "::error::Public HTTP smoke test failed. Checking service health over SSH."
            ssh -i ~/.ssh/oracle -p "${ORACLE_PORT}" "${ORACLE_USER}@${ORACLE_HOST}" \
              "sudo systemctl --no-pager --lines=80 status tac-shooter; echo ===LOCAL_HEALTH===; curl -i --max-time 5 http://127.0.0.1/api/health || true; echo ===PORTS===; sudo ss -ltnp | grep ':80' || true"
            exit 1
          fi
